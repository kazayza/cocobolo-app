name: cocobolo_app
description: COCOBOLO CRM Application
publish_to: 'none'
version: 1.0.5+6

environment:
  sdk: '>=3.4.0 <5.0.0'  # أحدث إصدارات Flutter

dependencies:
  flutter:
    sdk: flutter

  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  animated_text_kit: ^4.2.2
  image_picker: ^1.1.2
  font_awesome_flutter: ^10.6.0
  url_launcher: ^6.2.1
  intl: 0.20.2
  speech_to_text: ^7.0.0
  share_plus: ^7.2.0
  fl_chart: ^0.64.0
  percent_indicator: ^4.2.3
  pdf: ^3.10.8
  printing: ^5.11.1
  screenshot: ^3.0.0
  dio: ^5.4.0
  open_filex: ^4.3.4
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  package_info_plus: any
  flutter_pdfview: ^1.3.2
  shimmer: ^3.0.0
  geolocator: ^13.0.1
  slide_to_act: ^2.0.2
  map_launcher: ^3.0.0
  table_calendar: ^3.0.9
  excel: ^4.0.0
  provider: ^6.1.1
  
  
  
  flutter_localizations:
    sdk: flutter
  
  # Firebase - أحدث إصدارات (محدث)
  firebase_core: ^4.2.1
  firebase_messaging: ^16.0.4
  flutter_local_notifications: ^19.5.0
  timezone: ^0.10.1  # مطلوب لـ flutter_local_notifications

  http: ^1.2.2
  shared_preferences: ^2.5.4
  file_picker: ^10.3.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1   # 👈 هنا مكانها الصح

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/   # 👈 مهم عشان أيقونة التطبيق
    - assets/fonts/
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700

# 👇 ده في الجذر، برا flutter:
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"          # لسه مستخدمينها لـ iOS
  adaptive_icon_background: "#13273F"             # لون خلفية الأيقونة (Navy بتاع اللوجو)
  adaptive_icon_foreground: "assets/icons/app_icon.png"  # صورة اللوجو (Foreground)
  min_sdk_android: 21